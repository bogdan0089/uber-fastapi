name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uber_db_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations on test DB
        env:
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: uber_db_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_URL: redis://localhost:6379
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test
          SMTP_PASSWORD: test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          GROQ_API_KEY: dummy
        run: alembic upgrade head

      - name: Run tests
        env:
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: uber_db_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_URL: redis://localhost:6379
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test
          SMTP_PASSWORD: test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          GROQ_API_KEY: dummy
        run: pytest tests/ -v
